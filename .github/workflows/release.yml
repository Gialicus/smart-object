name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npm run typecheck

      # Trusted publishing via OIDC (configure on npmjs.com: workflow release.yml)
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ""
