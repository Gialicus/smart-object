name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No registry-url: avoids .npmrc with always-auth that interferes with OIDC
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npm run typecheck

      # OIDC trusted publishing is tried first (configure on npmjs.com: workflow release.yml).
      # NPM_TOKEN is the fallback if trusted publishing is not configured yet.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
