name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npm run typecheck

      # OIDC trusted publishing: requires npm >= 11.5.1 and configuration on npmjs.com
      # (Package settings → Trusted publishing → repo gialicus/smart-object, workflow release.yml)
      # Do NOT set NODE_AUTH_TOKEN — even an empty value blocks OIDC.
      - name: Publish to npm
        run: |
          unset NODE_AUTH_TOKEN
          unset NPM_CONFIG_USERCONFIG
          npm publish --access public
